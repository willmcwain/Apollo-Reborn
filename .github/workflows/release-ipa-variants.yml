name: Build and release IPA variants

on:
  workflow_dispatch:
    inputs:
      apollo_ipa_url:
        description: 'Direct URL to a decrypted Apollo IPA or prepared Apollo base IPA'
        required: true
        type: string
        default: 'https://downloads.apolloreborn.app/apollobase.ipa'
      prerelease:
        description: 'Mark GitHub release as prerelease'
        required: false
        default: false
        type: boolean
      draft:
        description: 'Create the GitHub release as a draft'
        required: false
        default: true
        type: boolean
      update_sources:
        description: 'Regenerate apps.json source files and push them back to main'
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Do not cancel a release mid-run: a cancelled run can leave a created
  # release without its committed source JSON / manifest update.
  cancel-in-progress: false

jobs:
  build-release:
    name: Build six IPA variants
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
          lfs: true
          # The source push at the end uses a GitHub App token that can bypass
          # the protected main ruleset. Do not persist checkout's GITHUB_TOKEN
          # auth header, or Git may push as github-actions[bot] instead.
          persist-credentials: true

      - name: Install build dependencies
        run: brew install ldid dpkg make

      - name: Add GNU make to PATH
        run: echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Setup Theos
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: theos/theos
          ref: 9bc73406cf80b711ef4d02c15ff1dedc4478a275 # master @ 2026-04-09
          path: theos
          submodules: recursive

      - name: Build rootful tweak package
        run: make package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Locate rootful package
        id: rootful_deb
        run: |
          DEB_PATH=$(ls -1t packages/*.deb | head -1)
          if [ -z "$DEB_PATH" ]; then
            echo "Error: no rootful .deb produced by make package"
            exit 1
          fi
          echo "deb_path=$DEB_PATH" >> "$GITHUB_OUTPUT"
          echo "Rootful tweak: $DEB_PATH"

      - name: Clean before rootless build
        run: make clean
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build rootless tweak package
        run: make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Rename rootless package
        run: |
          ROOTLESS_DEB=$(ls packages/*-arm64.deb | head -1)
          if [ -z "$ROOTLESS_DEB" ]; then
            echo "Error: no rootless .deb produced by make package"
            exit 1
          fi
          ROOTLESS_RENAMED="${ROOTLESS_DEB%-arm64.deb}-arm64_rootless.deb"
          mv "$ROOTLESS_DEB" "$ROOTLESS_RENAMED"
          echo "Rootless tweak: $ROOTLESS_RENAMED"

      - name: Install cyan
        run: |
          # cyan (the IPA injector) is not on PyPI under that name; the PyPI
          # "cyan" package is an unrelated placeholder. Install asdfzxcvbn's
          # pyzule-rw pinned to a tag so a cyan regression can't surprise a release.
          # Use a venv: the runner's Homebrew Python is externally managed
          # (PEP 668), so a system-wide pip install is rejected. Adding the venv
          # bin to PATH makes `cyan` available to later steps.
          python3 -m venv "$RUNNER_TEMP/cyan-venv"
          "$RUNNER_TEMP/cyan-venv/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/cyan-venv/bin/python" -m pip install \
            "https://github.com/asdfzxcvbn/pyzule-rw/archive/refs/tags/v1.4.4.zip"
          echo "$RUNNER_TEMP/cyan-venv/bin" >> "$GITHUB_PATH"
          # Fail loudly here if cyan isn't runnable, rather than later in the build.
          "$RUNNER_TEMP/cyan-venv/bin/cyan" --help >/dev/null
          echo "cyan installed: $RUNNER_TEMP/cyan-venv/bin/cyan"

      - name: Download Apollo IPA
        run: |
          curl -L --fail --retry 3 "${{ github.event.inputs.apollo_ipa_url }}" -o Apollo.ipa
          unzip -t Apollo.ipa >/dev/null

      - name: Collect metadata
        id: meta
        run: |
          # Read the version with plutil so it works whether the IPA carries a
          # binary or XML Info.plist (App Store IPAs ship a binary plist).
          unzip -p Apollo.ipa 'Payload/*.app/Info.plist' > Apollo-Info.plist
          APOLLO_VERSION=$(plutil -extract CFBundleShortVersionString raw -o - Apollo-Info.plist | tr -d '[:space:]')
          rm -f Apollo-Info.plist
          if [ -z "$APOLLO_VERSION" ]; then
            echo "Error: could not determine Apollo version from Apollo.ipa" >&2
            exit 1
          fi
          # Use the semantic tweak version for the tag/name/IPA, dropping the
          # trailing dpkg packaging revision in control (e.g. 2.14.0-33 -> 2.14.0).
          TWEAK_VERSION=$(sed -n 's/^Version: //p' control | sed 's/~/-/g' | sed -E 's/-[0-9]+$//')
          TAG_NAME="v${APOLLO_VERSION}_${TWEAK_VERSION}"
          RELEASE_NAME="Apollo v${APOLLO_VERSION} with Apollo-Reborn v${TWEAK_VERSION}"
          echo "apollo_version=${APOLLO_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tweak_version=${TWEAK_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Validate release inputs
        run: python3 ./scripts/validate_release_inputs.py "${{ steps.meta.outputs.apollo_version }}"

      - name: Build IPA variants
        run: |
          bash ./scripts/build_release_variants.sh \
            --ipa ./Apollo.ipa \
            --deb "${{ steps.rootful_deb.outputs.deb_path }}" \
            --output-dir ./dist/out

      - name: Generate release notes
        run: python3 ./scripts/generate_release_notes.py > RELEASE_NOTES.md
        env:
          APOLLO_VERSION: ${{ steps.meta.outputs.apollo_version }}
          TWEAK_VERSION: ${{ steps.meta.outputs.tweak_version }}

      - name: Create release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.0.8
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          body_path: RELEASE_NOTES.md
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            dist/out/*.ipa
            packages/*.deb

      - name: Summarize release outputs
        run: |
          BUILD_VERSION=$(python3 -c 'import json; print(json.load(open("distribution/config.json", encoding="utf-8"))["app"]["buildVersion"])')
          {
            echo "## Release"
            echo ""
            echo "- Tag: \`${{ steps.meta.outputs.tag_name }}\`"
            echo "- Name: \`${{ steps.meta.outputs.release_name }}\`"
            echo "- Apollo version: \`${{ steps.meta.outputs.apollo_version }}\`"
            echo "- Apollo-Reborn version: \`${{ steps.meta.outputs.tweak_version }}\`"
            echo "- Build version: \`${BUILD_VERSION}\`"
            echo ""
            echo "## IPA assets"
            echo ""
            for ipa in dist/out/*.ipa; do
              echo "- \`$(basename "$ipa")\` ($(du -h "$ipa" | cut -f1))"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize source URLs
        # Only when this run actually regenerates/publishes the sources. Drafts
        # (and runs that skip the source update) would otherwise advertise
        # apps.json/manifest URLs for a release that has not been published.
        if: github.ref == 'refs/heads/main' && inputs.update_sources && !inputs.draft
        run: |
          {
            echo ""
            echo "## Source URLs"
            echo ""
            python3 - <<'PY'
          import json
          config = json.load(open("distribution/config.json", encoding="utf-8"))
          base = config["distribution"]["sourceBaseURL"].rstrip("/")
          for variant in config["variants"]:
              print(f"- `{base}/{variant['output']}`")
          print(f"- `{base}/{config['distribution']['manifestOutput']}`")
          PY
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update source JSON files
        # Inline update for the automated path (draft=false dispatch). Skipped
        # for drafts: their assets aren't publicly downloadable, so committing
        # source JSON pointing at them would 404. Drafts are instead handled
        # when published manually -- see publish-sources.yml, which fires on the
        # release:released event. A release created here uses GITHUB_TOKEN, which
        # does NOT fire that event, so the two paths never double-run. The final
        # protected push is authenticated with a dedicated GitHub App token so
        # this can update main without opening a PR.
        if: github.ref == 'refs/heads/main' && inputs.update_sources && !inputs.draft
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 ./scripts/update_source_json.py

      - name: Commit updated source JSON files
        if: github.ref == 'refs/heads/main' && inputs.update_sources && !inputs.draft
        env:
          GITHUB_TOKEN: ${{ github.token }}   # already set above — just use it here too
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps.json apps_noext.json apps_glass.json apps_noext_glass.json \
            apps_glass_icons.json apps_noext_glass_icons.json release-manifest.json
          if git diff --cached --quiet; then
            echo "No source JSON changes to commit."
            exit 0
          fi
          git commit -m "Update distribution sources for ${{ steps.meta.outputs.tag_name }}"
          git push origin HEAD:main
          # Capture the SHA after the push so the summary reflects what actually
          # landed on main; the rebase above can replay the commit to a new SHA.
          SOURCE_COMMIT=$(git rev-parse HEAD)
          {
            echo ""
            echo "## Source update"
            echo ""
            echo "- Commit: \`${SOURCE_COMMIT}\`"
          } >> "$GITHUB_STEP_SUMMARY"
